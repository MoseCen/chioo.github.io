<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>距离春节倒计时</title>
  <style>
   body {
  margin: 0;
  padding: 0;
  background-image: url('t.jpg');
  background-repeat: no-repeat;
  background-size: contain;
  background-position: center;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  height: 100vh;
  overflow: auto;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

    #countdown {
      font-size: 24px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div id="countdown"></div>

  <script>
    // 计算距离春节的剩余时间
    function getTimeUntilSpringFestival() {
      const now = new Date();
      const springFestival = new Date(2024, 1, 10); // 设置春节日期为 2024 年 2 月 10 日
      const timeDiff = springFestival - now;

      // 将剩余时间转换为天、小时、分钟和秒
      const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);

      document.getElementById('countdown').innerHTML = `距离春节还有 ${days} 天 ${hours} 小时 ${minutes} 分钟 ${seconds} 秒`;
    }

    // 每秒更新一次倒计时
    setInterval(getTimeUntilSpringFestival, 1000);
  </script>
</body>
</html>
